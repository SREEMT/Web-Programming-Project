<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">
  <div class="container py-4">
    <div class="d-flex align-items-center mb-3">
      <h2 class="me-3 mb-0">Watchlist</h2>
      <button id="refreshBtn" class="btn btn-primary btn-sm">Load Watchlist</button>
    </div>

    <ul id="list" class="list-group list-group-flush bg-dark border rounded">
      <li class="list-group-item bg-dark text-secondary border-0">Click “Load Watchlist” to fetch items.</li>
    </ul>
  </div>

  <script src="scripts/watchlist.js"></script>
  <script>
    document.getElementById("refreshBtn").addEventListener("click", loadWatchlist);
  </script>
</body>
</html>
